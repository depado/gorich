# GoReleaser configuration for GoRich library
# Documentation: https://goreleaser.com

version: 2

project_name: gorich

# Skip building binaries since this is a library
builds:
  - skip: true

# Create source archive
source:
  enabled: true
  name_template: "{{ .ProjectName }}-{{ .Version }}-source"

# Changelog configuration
changelog:
  use: github
  sort: asc
  abbrev: 0
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Refactors
      regexp: '^.*?refactor(\([[:word:]]+\))??!?:.+$'
      order: 3
    - title: Documentation
      regexp: '^.*?docs(\([[:word:]]+\))??!?:.+$'
      order: 4
    - title: Others
      order: 999
  filters:
    exclude:
      - "^test:"
      - "^chore:"
      - merge conflict
      - Merge pull request

# GitHub release configuration
release:
  github:
    owner: depado
    name: gorich
  draft: false
  prerelease: auto
  mode: replace
  name_template: "v{{ .Version }}"
  header: |
    ## GoRich {{ .Version }}

    A Go port of Python's [Rich](https://github.com/Textualize/rich) library for beautiful terminal output.

    ### Installation

    ```bash
    go get github.com/depado/gorich@v{{ .Version }}
    ```

# Announce release (optional - remove if not needed)
# announce:
#   skip: true

# Validate before release
before:
  hooks:
    - go mod tidy
    - go mod verify
    - go build ./...
    - go test ./...

# Metadata
metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

# Git configuration
git:
  # Only include commits since the last tag
  ignore_tags:
    - nightly
  tag_sort: -version:refname
